<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biến, kiểu dữ liệu và toán tử</title>
</head>
<body>
    <form>
        <label for="vl">Vật lý</label>
        <input type="number" name="Vatly" id="vl">
        <label for="hh">Hóa học</label>
        <input type="number" name="Hoahoc" id="hh">
        <label for="sh">Sinh học</label>
        <input type="number" name="Sinhhoc" id="sh">
        <button type="button" onclick="inraconsole()">Điểm trung bình</button>
        <p id="dtb"></p>
        
    </form>
    <script>
        
        function inraconsole() {
            let inputvly = document.getElementById("vl").value;
            let inputhhoc = document.getElementById("hh").value;
            let inputshoc = document.getElementById("sh").value;

            let vly = parseInt(inputvly); //let vly = number(inputvly); hoặc let vly = + inputvly;
            let hhoc = parseInt(inputhhoc);
            let shoc = parseInt(inputshoc);

            let diemtrungbinh = (vly + hhoc + shoc)/3;
            document.getElementById("dtb").innerHTML="Điểm trung bình 3 môn: " + diemtrungbinh;
            console.log(typeof vly);
        }
    </script>
</body>
</html>
