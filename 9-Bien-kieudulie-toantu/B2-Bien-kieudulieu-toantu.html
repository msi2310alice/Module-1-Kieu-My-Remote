<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi độ C sang F</title>
</head>
<body>
    <form>
        <label for="c">Độ Celsius</label>
        <input type="number" name="Celsius" id="c" placeholder="Nhập độ C">
        <button type="button" onclick="doinhietdo()">Nhiệt độ</button>
        <p id="dof"></p>
    </form>
    <script>
        function doinhietdo() {
            let inputc = document.getElementById("c").value;
            let c = +inputc;
            let f = c*(9/5)+32;
            document.getElementById("dof").innerHTML="Nhiệt độ Fahrenheit: " + f +" độ F";

        }
    </script>
</body>
</html>
