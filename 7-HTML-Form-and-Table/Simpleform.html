<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo form cơ bản</title>
    <style>
        * {
            font-family: "Lucida Grande", "Lucida Sans Unicode", Tahoma, sans-serif;
        }
    </style>
</head>
<body>
    <form action="Simpleform.html" method="get">
        <h2>Order Form</h2>
            <p>What would you like to buy?</p>
            <select>
                <option value=" ">A</option>
                <option>B (+ 0.5$)</option>
                <option>C (+ 0.5$)</option>
            </select>
            <p>How many would you like to order?</p>
            <input id="1-$10" type="radio" name="rd" value="1-$10"/> 
            <label for="1-$10">1-$10</label><br>
            <input id="2-$20" type="radio" name="rd" value="2-$20"/> 
            <label for="2-$20">2-$20</label><br>
            <input id="3-$25" type="radio" name="rd" value="3-$25"/> 
            <label for="3-$25">3-$25</label><br>
            <p>Name <span style="color: red;">*</span></p>
            <input type="text" name="Firstname" id="Firstname" placeholder="Firstname">
            <input type="text" name="LastName" id="LastName" placeholder="LastName">
            <p>Email</p>
            <input type="text" name="Email">
            <p>Phone Number</p>
            <input type="text"> - 
            <input type="text"> - 
            <input type="text"> 
            <br>
            <p><input type="button" value="Submit"></p>
    </form>
</body>
</html>
