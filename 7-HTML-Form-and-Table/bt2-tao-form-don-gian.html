<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo form đơn giản</title>
    <style>
        body {font-family: Arial, Helvetica, sans-serif;
        background: white;
        }
        form {
           width: 700px; 
           margin: 30px auto;
           background: #d9f3f4 ;
           padding:15px;
        }
        h1 {
            background: orange;
            color: white;
            text-align: center;
            padding: 10px;
            margin: 0 0 15px 0;

        }
        label[for="yourname"], label[for="email"]{
            color: blue;
            display: inline-block;
            width: 100px;
            text-align: right;
            margin-right: 10px;
        }
        p {
             color: blue;
            display: inline-block;
            width: 100px;
            text-align: right;
            margin-right: 15px;
            margin-top: 15px;
        }
        input[type="text"]{
            width: 250px;
            height: 25px;
            margin-bottom: 10px;
        }
        input[type="checkbox"] {
            color: orange;
            margin-right: 5px;
        }
        input[type="submit"], input[type="reset"]{
            margin-top: 15px;
            padding:6px 12px;
        }
    </style>
</head>
<body>
    <form>
        <h1>SỞ THÍCH CỦA BẠN</h1>
        <label for="yourname">Họ và tên</label>
        <input type="text" name="yourname" id="yourname">
        <br>
        <label for="email">Email</label>
        <input type="text" name="email" id="email">
        <br>
        <p>Sở thích</p>
        <input type="checkbox" name="so-thich" id="the-thao" value="Thể thao">
        <label for="the-thao">Thể thao</label>
        <input type="checkbox" name="so-thich" id="am-nhac" value="Âm nhạc">
        <label for="am-nhac">Âm nhạc</label>
        <input type="checkbox" name="so-thich" id="doc-sach" value="Đọc sách">
        <label for="doc-sach">Đọc sách</label>
        <input type="checkbox" name="so-thich" id="luot-web" value="Lướt web">
        <label for="luot-web">Lướt web</label>
        <br>
        <input type="checkbox" name="so-thich" id="choi-game" value="Chơi game">
        <label for="choi-game">Chơi game</label>
        <input type="checkbox" name="so-thich" id="dien-anh" value="Điện ảnh">
        <label for="dien-anh">Điện ảnh</label>
        <input type="checkbox" name="so-thich" id="du-lich" value="Du lịch">
        <label for="du-lich">Du lịch</label>
        <br>
        <input type="submit" value="Gửi thông tin">
        <input type="reset" value="Nhập lại">
    </form>
</body>
</html>
