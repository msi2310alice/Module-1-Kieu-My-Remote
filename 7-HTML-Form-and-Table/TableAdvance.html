<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo bảng nâng cao</title>
    <style>
        body {
            padding: 50px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-family: Arial, Helvetica, sans-serif;
        }
        td, th {
            border: 1px solid brown;
            text-align: center;
            padding: 8px;
        }
        th {
            font-size: 16px;
            font-weight: 400;
            color: white;
            text-align: center;
            padding: 15px;
            border-color: white;
        }
        td {
            font-size: 13px;
            font-weight: 400;
            color: blueviolet;
            padding: 10px;
        }
        .hover {
            background-color: red;
        }
        
    </style>
</head>
<body>
    <table>
        <tr class="hover" >
            <th rowspan="2" >Thứ</th>
            <th colspan="2" >Hoạt động</th>
        </tr>
        <tr class="hover">
            <th>Sáng</th>
            <th>Chiều</th>
        </tr>
        <tr>
            <td>Thứ Hai</td>
            <td>Thể dục</td>
            <td>HD trò chơi mới</td>
        </tr>
        <tr>
            <td>Thứ 3</td>
            <td>Nhận biết tập nói</td>
            <td>Rèn nề nếp kỹ năng sống</td>
        </tr>
        <tr>
            <td>Thứ 4</td>
            <td>Âm nhạc</td>
            <td>Vui chơi</td>
        </tr>
        <tr>
            <td>Thứ 5</td>
            <td>Văn Học</td>
            <td>Nhận biết các giá trị sống</td>
        </tr>
    </table>
</body>
</html>
